<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; font-family: 'Consolas', monospace; background: #1e1e1e; color: #fff; display: flex; height: 100vh; }
        #sidebar { width: 200px; background: #252526; padding: 10px; }
        #editor-container { flex-grow: 1; display: flex; flex-direction: column; }
        .tab-bar { background: #2d2d2d; display: flex; padding: 5px; }
        .tab { background: #333; padding: 5px 15px; margin-right: 5px; cursor: pointer; border-radius: 3px; }
        .tab.active { background: #1e1e1e; border-top: 2px solid #007acc; }
        textarea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-size: 16px; resize: none; }
        button { cursor: pointer; margin-top: 5px; width: 100%; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>My Files</h3>
    <button onclick="addTab()">+ เพิ่มแท็บใหม่</button>
    <div id="file-list"></div>
    <button onclick="clearAll()" style="background: red; color: white;">🗑️ ลบทั้งหมด</button>
</div>

<div id="editor-container">
    <div class="tab-bar" id="tab-bar"></div>
    <textarea id="editor" placeholder="เขียนโค้ดที่นี่..."></textarea>
</div>

<script>
    let tabs = [{id: 1, name: "script.lua", content: ""}];
    let activeTabId = 1;

    function renderTabs() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = '';
        tabs.forEach(t => {
            tabBar.innerHTML += `<div class="tab ${t.id === activeTabId ? 'active' : ''}" onclick="switchTab(${t.id})">
                ${t.name} <span onclick="removeTab(${t.id})">×</span>
            </div>`;
        });
    }

    function addTab() {
        let newId = Date.now();
        tabs.push({id: newId, name: "new_file.lua", content: ""});
        switchTab(newId);
    }

    function removeTab(id) {
        tabs = tabs.filter(t => t.id !== id);
        if (tabs.length === 0) addTab();
        switchTab(tabs[0].id);
    }

    function switchTab(id) {
        activeTabId = id;
        renderTabs();
    }

    function clearAll() {
        if(confirm("ลบทั้งหมดแน่ใจนะ?")) {
            document.getElementById('editor').value = "";
        }
    }

    renderTabs();
</script>
</body>
</html>
